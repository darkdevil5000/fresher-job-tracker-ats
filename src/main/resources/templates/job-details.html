<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${job.title + ' at ' + job.company + ' | Details'}">Job Details</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="/" class="logo">IT-Job<span>Scrape</span></a>
            <a href="/" class="btn-secondary" style="border-radius:30px;">Back to Jobs</a>
        </div>
    </header>

    <main class="container">
        
        <a href="/" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:middle;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Dashboard
        </a>

        <div class="card">
            <div class="detail-header">
                <span class="job-tag" th:text="${job.source}">Google News Feed</span>
                <h1 style="font-size: 2.2rem; font-weight: 800; margin: 0.5rem 0;" th:text="${job.title}">Senior Developer</h1>
                <h3 style="color: var(--accent); font-weight: 600;" th:text="${job.company}">Cognizant Tech Solutions</h3>
                
                <div style="display: flex; gap: 2rem; margin-top: 1.2rem; color: var(--text-secondary); font-size: 0.95rem;">
                    <div>📍 <span th:text="${job.location}">Remote, India</span></div>
                    <div>💰 <span th:text="${job.salary}">3.6 - 4.8 LPA</span></div>
                    <div>📅 Posted: <span th:text="${job.datePosted}">2026-07-20</span></div>
                </div>
            </div>

            <h2 style="font-size: 1.4rem; font-weight: 700; margin-bottom: 1rem;">Job Description</h2>
            <div class="jd-box" th:text="${job.description}"></div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <a th:href="${job.applyUrl}" target="_blank" class="btn-secondary" style="padding: 0.9rem 2rem; font-size: 1rem; border-radius: 8px;">
                    🔗 Open Apply Link
                </a>
                <a th:href="@{/resume/build/{jobId}(jobId=${job.id})}" class="btn-primary" style="padding: 0.9rem 2.5rem; font-size: 1rem; border-radius: 8px;">
                    📄 Generate ATS LaTeX Resume
                </a>
            </div>
        </div>

    </main>

    <footer>
        <p>&copy; 2026 IT-JobScrape. Built entirely in Java & Spring Boot.</p>
    </footer>

</body>
</html>
