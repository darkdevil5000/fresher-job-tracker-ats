<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | IT-JobScrape</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

    <main class="container" style="max-width: 450px; margin-top: 6rem;">
        <div class="card" style="padding: 2.5rem;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <a href="/login" class="logo" style="font-size: 1.8rem;">IT-Job<span>Scrape</span></a>
                <p style="color: var(--text-secondary); margin-top: 5px;">Log in to access your jobs and tracking pipeline.</p>
            </div>

            <!-- Error Notification -->
            <div th:if="${error}" class="alert" th:text="${error}" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.2); padding: 0.8rem; font-size: 0.88rem; text-align: center;"></div>

            <form action="/login" method="post">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="username" name="password" style="width: 100%; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color); border-radius: 8px; padding: 0.8rem 1rem; color: white; font-size: 0.95rem; outline: none; transition: all 0.3s ease;" placeholder="Enter password" required>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; padding: 0.8rem; border-radius: 8px; font-size: 1rem; margin-top: 1rem;">Log In</button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
                Don't have an account? <a href="/register" style="color: var(--accent); text-decoration: none; font-weight: 600;">Register here</a>
            </div>
        </div>
    </main>

</body>
</html>
